version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_URL: "postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      CHAINS_SUPPORTED: "ethereum"
      RPC_URLS_ETHEREUM: "http://localhost:8545"
      FINALITY_BLOCKS_ETHEREUM: "64"
      WALLET_MGMT_URL: "http://wallet-mgmt:9090"
      LOG_LEVEL: "info"
      METRICS_PORT: "9100"
    ports:
      - "8080:8080"
      - "9090:9090"
      - "9100:9100"

volumes:
  pgdata: